name: release-auto-update

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish-and-update-appcast:
    runs-on: windows-latest

    env:
      APP_NAME: ServerMultiTool
      RUNTIME_ID: win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ inputs.tag }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Unable to resolve release tag"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "base_url=https://github.com/${{ github.repository }}/releases/download/$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ServerMultiTool.sln

      - name: Publish app
        shell: pwsh
        run: |
          $publishDir = "artifacts/publish"
          dotnet publish ServerMultiTool/ServerMultiTool.csproj -c Release -r $env:RUNTIME_ID --self-contained false -o $publishDir

      - name: Pack release zip
        shell: pwsh
        run: |
          $zipPath = "artifacts/$($env:APP_NAME)-$($env:RUNTIME_ID).zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "artifacts/publish/*" -DestinationPath $zipPath

      - name: Install NetSparkle appcast tool
        shell: pwsh
        run: dotnet tool install --tool-path ./.tools NetSparkleUpdater.Tools.AppCastGenerator --version 2.9.0

      - name: Download existing appcast (if exists)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/appcast -Force | Out-Null
          $owner = "${{ github.repository_owner }}"
          $repo = "${{ github.event.repository.name }}"
          $appcastUrl = "https://$owner.github.io/$repo/appcast.xml"
          $signatureUrl = "https://$owner.github.io/$repo/appcast.xml.signature"

          try {
            Invoke-WebRequest -Uri $appcastUrl -OutFile artifacts/appcast/appcast.xml -UseBasicParsing
          }
          catch {
            Write-Host "appcast.xml not found yet (first release is expected)."
          }

          try {
            Invoke-WebRequest -Uri $signatureUrl -OutFile artifacts/appcast/appcast.xml.signature -UseBasicParsing
          }
          catch {
            Write-Host "appcast.xml.signature not found yet (first release is expected)."
          }

      - name: Generate appcast.xml
        shell: pwsh
        env:
          NETSPARKLE_PRIVATE_KEY: ${{ secrets.NETSPARKLE_PRIVATE_KEY }}
          NETSPARKLE_PUBLIC_KEY: ${{ secrets.NETSPARKLE_PUBLIC_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NETSPARKLE_PRIVATE_KEY)) {
            throw "GitHub secret NETSPARKLE_PRIVATE_KEY is not set"
          }
          if ([string]::IsNullOrWhiteSpace($env:NETSPARKLE_PUBLIC_KEY)) {
            throw "GitHub secret NETSPARKLE_PUBLIC_KEY is not set"
          }

          ./.tools/netsparkle-generate-appcast.exe `
            -a artifacts/appcast `
            -b artifacts `
            -e zip `
            -n $env:APP_NAME `
            -o windows `
            -u "${{ steps.meta.outputs.base_url }}" `
            --private-key-override "$env:NETSPARKLE_PRIVATE_KEY" `
            --public-key-override "$env:NETSPARKLE_PUBLIC_KEY" `
            --reparse-existing `
            --human-readable

      - name: Upload release zip asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: artifacts/${{ env.APP_NAME }}-${{ env.RUNTIME_ID }}.zip
          fail_on_unmatched_files: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/appcast

      - name: Deploy appcast to GitHub Pages
        uses: actions/deploy-pages@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}


